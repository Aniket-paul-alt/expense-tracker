[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

# ── Secrets scanning ──────────────────────────────────────────────────────────
# firebase-messaging-sw.js contains the Firebase *client* config (apiKey, projectId, etc.).
# These are intentionally public values — the Firebase SDK requires them in plain text
# in a service worker file that CANNOT use runtime environment variables.
# They are NOT server-side secrets; Firebase client config is safe to expose (by design).
# See: https://firebase.google.com/docs/projects/api-keys
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "public/firebase-messaging-sw.js"
  SECRETS_SCAN_OMIT_KEYS  = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
